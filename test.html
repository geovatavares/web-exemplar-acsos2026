<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste ADHuman WCAG</title>
  <style>
    body {
      background: #eee;
      color: #aaa;
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    .status-erro {
      color: red;
    }

    .small-text {
      font-size: 10px;
      line-height: 1;
      max-width: 1200px;
    }

    button {
      background: #f5f5f5;
      color: #999;
      border: 1px solid #ccc;
      padding: 8px 12px;
    }

    input {
      border: 1px solid #ddd;
      padding: 6px;
    }
  </style>
</head>
<body>
  <h1>Teste do ADHuman WCAG</h1>

  <p class="small-text">
    Este parágrafo foi criado para apresentar baixa legibilidade, fonte pequena,
    espaçamento inadequado e largura excessiva.
  </p>

  <p class="status-erro">erro no envio do formulário</p>

  <button>Enviar</button>
  <br><br>
  <input type="text" placeholder="Digite seu nome">
</body>
</html>
